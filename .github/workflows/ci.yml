name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    services:
      # Postgres for the DB-gated integration/e2e suites. Without it those
      # `describe.skipIf(!dbAvailable)` suites SKIP in CI — i.e. ~124 tests that
      # never actually ran. Mirrors the `postgres-test` service in
      # docker-compose.yml (image/creds/port) so local and CI behave identically;
      # the tests connect to localhost:5434 via DATABASE_TEST_URL below.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: linchkit_test
          POSTGRES_PASSWORD: linchkit_test
          POSTGRES_DB: linchkit_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U linchkit_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Biome check
        run: bunx biome check .

      - name: TypeScript type check
        run: bun run typecheck

      - name: Run tests
        shell: bash
        env:
          # Flips the DB-gated `describe.skipIf(!dbAvailable)` suites from skip to
          # run. Matches the `postgres` service above and the hardcoded default
          # the test files fall back to.
          DATABASE_TEST_URL: postgres://linchkit_test:linchkit_test@localhost:5434/linchkit_test
        run: |
          # Bun 1.2.18 occasionally segfaults during process teardown
          # (panic 0x4A at exit) even when every test passes. The crash can land
          # AFTER the summary (a "0 fail" line is printed) or BEFORE it (no
          # summary at all). In both cases bun prints a per-test "(fail)" line
          # for any genuine failure as the tests run, so the reliable signal is:
          # a non-zero exit with at least one "(pass)" line and ZERO "(fail)"
          # lines is the teardown segfault — not a real test failure.
          set +e
          OUTPUT=$(bun test 2>&1)
          RC=$?
          set -e
          printf '%s\n' "$OUTPUT"
          if [ "$RC" -eq 0 ]; then
            exit 0
          fi
          # Use here-strings (not `printf | grep`): the shell runs with pipefail,
          # and `grep -q` closes the pipe on its first match (an early `(pass)`
          # line), which SIGPIPEs printf and makes the pipeline return non-zero —
          # defeating the check. `<<<` feeds grep directly with no pipe.
          if grep -qE '^\(pass\)' <<< "$OUTPUT" \
             && ! grep -qE '^\(fail\)' <<< "$OUTPUT"; then
            echo "::warning::bun test exited $RC with passing tests and no (fail) lines — treating as success (known Bun teardown segfault, panic 0x4A; the crash may precede the summary)."
            exit 0
          fi
          exit "$RC"

  capability-lint:
    name: Capability Lint
    runs-on: ubuntu-latest
    # Advisory gate for Spec 21 §9.1: surfaces non-compliant capabilities on
    # every PR. This job is intentionally NOT in the branch-protection required
    # checks — it reports (red X) without blocking merge. Promote it to a
    # required check in branch protection to make §9.1 compliance mandatory.
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint all capabilities (metadata, import-boundary, tests)
        shell: bash
        run: |
          # Run `linch lint-capability` over every addon capability. Fail this
          # job if any capability violates a §9.1 gate so the regression is
          # visible on the PR. All addons pass as of this job's introduction.
          fail=0
          for d in addons/*/cap-*/; do
            if ! bun packages/cli/src/index.ts lint-capability "$d"; then
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more capabilities failed lint-capability (Spec 21 §9.1)."
          fi
          exit "$fail"
