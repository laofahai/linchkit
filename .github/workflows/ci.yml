name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: these jobs only check out code and run lint/typecheck/tests.
# No write access to contents, PRs, issues, deployments, etc.
permissions:
  contents: read

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    services:
      # Postgres for the DB-gated integration/e2e suites. Without it those
      # `describe.skipIf(!dbAvailable)` suites SKIP in CI — i.e. ~124 tests that
      # never actually ran. Mirrors the `postgres-test` service in
      # docker-compose.yml (image/creds/port) so local and CI behave identically;
      # the tests connect to localhost:5434 via DATABASE_TEST_URL below.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: linchkit_test
          POSTGRES_PASSWORD: linchkit_test
          POSTGRES_DB: linchkit_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U linchkit_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
      # Redis for the Redis-gated cache integration suite. Without it the
      # `describe.skipIf(!redisAvailable)` suite SKIPS in CI — i.e. the real
      # ioredis GET/SET/DEL/EXPIRE/SUBSCRIBE/PUBLISH path never runs. Mirrors
      # the `redis-test` service in docker-compose.yml (image/port) so local
      # and CI behave identically; the test connects to localhost:6380 via
      # REDIS_TEST_URL below. The host port is 6380 (not 6379) to avoid
      # clashing with a developer's local Redis, mirroring postgres's 5434.
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Biome check
        run: bun run check

      - name: TypeScript type check
        run: bun run typecheck

      - name: Verify test coverage (every test file is in a batch)
        shell: bash
        # Proves scripts/run-tests.sh executes EVERY *.test.ts(x) in the repo.
        # Fails the job if a file is in no batch — so a new test directory can
        # never silently fall outside the runner's coverage.
        run: bash scripts/verify-test-coverage.sh

      - name: Run tests
        shell: bash
        env:
          # Flips the DB-gated `describe.skipIf(!dbAvailable)` suites from skip to
          # run. Matches the `postgres` service above and the hardcoded default
          # the test files fall back to.
          DATABASE_TEST_URL: postgres://linchkit_test:linchkit_test@localhost:5434/linchkit_test
          # Flips the Redis-gated `describe.skipIf(!redisAvailable)` cache suite
          # from skip to run. Matches the `redis` service above and the
          # hardcoded default the test file falls back to.
          REDIS_TEST_URL: redis://localhost:6380
        # A single root `bun test` does NOT run the whole suite: Bun 1.2.18
        # crashes MID-RUN (panic 0x4A) inside packages/cli's
        # lint-capability.test.ts, BEFORE addons/ is reached — so 0 of the 177
        # addons test files ran, and the old guard masked the truncated run as
        # success. scripts/run-tests.sh runs the suite as completion-verified
        # batches, quarantines the one known crash file with an explicit logged
        # allowance, and FAILS the job on any truncated/crashed batch.
        run: bash scripts/run-tests.sh

  capability-lint:
    name: Capability Lint
    runs-on: ubuntu-latest
    # Advisory gate for Spec 21 §9.1: surfaces non-compliant capabilities on
    # every PR. This job is intentionally NOT in the branch-protection required
    # checks — it reports (red X) without blocking merge. Promote it to a
    # required check in branch protection to make §9.1 compliance mandatory.
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint all capabilities (metadata, import-boundary, tests)
        shell: bash
        run: |
          # Run `linch lint-capability` over every addon capability. Fail this
          # job if any capability violates a §9.1 gate so the regression is
          # visible on the PR. All addons pass as of this job's introduction.
          fail=0
          for d in addons/*/cap-*/; do
            if ! bun packages/cli/src/index.ts lint-capability "$d"; then
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more capabilities failed lint-capability (Spec 21 §9.1)."
          fi
          exit "$fail"
