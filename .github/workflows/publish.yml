name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Biome check
        run: bunx biome check .

      - name: TypeScript type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

  publish:
    name: Publish to npm
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Extract and validate version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

          # Validate tag version matches @linchkit/core version
          CORE_VERSION=$(jq -r '.version' packages/core/package.json)
          if [ "$TAG_VERSION" != "$CORE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match @linchkit/core version ($CORE_VERSION)"
            exit 1
          fi
          echo "Tag version $TAG_VERSION matches core package version"

      - name: Build and publish packages
        run: bun scripts/release.ts
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
