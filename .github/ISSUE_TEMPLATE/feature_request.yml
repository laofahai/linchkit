name: Feature Request
description: Suggest a new feature or enhancement
labels: ["feature"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature?
      options:
        - "P0: Critical — blocks milestone"
        - "P1: High — important for milestone goals"
        - "P2: Medium — improves completeness"
        - "P3: Low — backlog"
    validations:
      required: true

  - type: dropdown
    id: milestone
    attributes:
      label: Target Milestone
      description: Which milestone does this belong to?
      options:
        - "M5: Platform Maturity & AI Evolution"
        - "M6: AI Intelligence"
        - "M7: Ecosystem"
        - "Unsure"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
    validations:
      required: false

  - type: input
    id: spec
    attributes:
      label: Related Spec
      description: "Spec number if applicable (e.g., Spec 48)"
      placeholder: "Spec XX"
    validations:
      required: false
