name: Bug Report
description: Report a bug in LinchKit
labels: ["bug"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How severe is this bug?
      options:
        - "P0: Critical — system broken / data loss"
        - "P1: High — major feature broken"
        - "P2: Medium — workaround exists"
        - "P3: Low — cosmetic / minor"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Minimal steps to reproduce the issue"
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: LinchKit Version
      placeholder: "0.1.0"
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, Bun version, PostgreSQL version"
      placeholder: "macOS 15, Bun 1.2, PostgreSQL 17"
    validations:
      required: false
