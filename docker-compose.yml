services:
  postgres-test:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: linchkit_test
      POSTGRES_PASSWORD: linchkit_test
      POSTGRES_DB: linchkit_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linchkit_test"]
      interval: 2s
      timeout: 5s
      retries: 5
