services:
  postgres:
    image: postgres:16-alpine
    container_name: linchkit-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: linchkit
      POSTGRES_PASSWORD: linchkit
      POSTGRES_DB: linchkit
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linchkit"]
      interval: 2s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: linchkit_test
      POSTGRES_PASSWORD: linchkit_test
      POSTGRES_DB: linchkit_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linchkit_test"]
      interval: 2s
      timeout: 5s
      retries: 5

  linchkit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linchkit-app
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: ${DATABASE_URL:-postgres://linchkit:linchkit@postgres:5432/linchkit}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped

  restate:
    image: docker.restate.dev/restatedev/restate:latest
    ports:
      - "8080:8080"   # ingress (invoke workflows)
      - "9070:9070"   # admin API + Web UI
    environment:
      - RESTATE_OBSERVABILITY__LOG__FILTER=restate=info
    volumes:
      - restate-data:/target/restate-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9070/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg-data:
  restate-data:
